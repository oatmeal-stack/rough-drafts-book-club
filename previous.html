<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rough Drafts Book Club — Previously Read</title>
<style>
  :root {
    --ink: #2b2420;
    --paper: #faf6ef;
    --accent: #8a3324;
    --muted: #7a7268;
    --line: #e4dbc9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 56px;
  }
  nav {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 14px 0 8px;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  nav a { color: var(--muted); text-decoration: none; }
  nav a.active {
    color: var(--accent);
    font-weight: bold;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 6px;
  }
  h1.club-title {
    text-align: center;
    font-size: 22px;
    letter-spacing: 0.04em;
    margin: 0 0 4px;
    color: var(--accent);
  }
  .eyebrow {
    text-align: center;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 30px;
  }
  .book-row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 18px 0;
    border-bottom: 1px solid var(--line);
  }
  .book-row:first-of-type { border-top: 1px solid var(--line); }
  .book-row img {
    width: 64px;
    flex-shrink: 0;
    border-radius: 3px;
    box-shadow: 0 4px 10px rgba(43,36,32,0.2);
  }
  .book-info { flex: 1; min-width: 0; }
  .book-info h3 {
    margin: 0 0 2px;
    font-size: 17px;
    line-height: 1.3;
  }
  .book-info p.author {
    margin: 0 0 6px;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
  }
  .book-info p.date-read {
    margin: 0 0 8px;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .book-info a {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
  }
  footer {
    text-align: center;
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    color: var(--muted);
    margin-top: 30px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a href="index.html">Next Book</a>
      <a href="proposed.html">Proposed</a>
      <a href="previous.html" class="active">Previously Read</a>
    </nav>

    <h1 class="club-title">Rough Drafts Book Club</h1>
    <p class="eyebrow">Previously Read — Newest First</p>

    <div class="book-row">
      <img src="https://covers.openlibrary.org/b/isbn/0452295297-M.jpg" alt="City of Thieves cover">
      <div class="book-info">
        <h3>City of Thieves</h3>
        <p class="author">David Benioff</p>
        <p class="date-read">Date read: July 2026</p>
        <a href="https://www.amazon.com/dp/0452295297" target="_blank" rel="noopener">View on Amazon</a>
      </div>
    </div>

    <footer>More titles will appear here as the club finishes them.</footer>
  </div>
</body>
</html>
